# markdown-delight theme — hacker (phosphor green tube, purple complement shell)
# Edit this file while the app is running: it hot-reloads. No recompile.
name = "hacker"

[colors]
bg      = "#03100a"
surface = "#071a10"
text    = "#86efac"
accent  = "#22c55e"
faint   = "#14401f"

[shell]
# the monitor housing — complement of the phosphor (green tube → purple shell)
frame_bg     = "#1b1026"
frame_text   = "#cdb8dc"
frame_border = "#a86fd2"
frame_faint  = "#b888e5"

[effects]
scanline_opacity = 0.22    # 0 = off
scanline_step    = 4.0     # px between scanlines
vignette         = 0.8     # curved-glass falloff, 0 = off
glow             = 0.85    # accent glow strength (header, frame)
bloom            = 0.9     # center phosphor bloom
tracking         = 0.6     # rolling tracking band strength
tracking_period  = 16.0    # seconds between sweeps
tracking_sweep   = 7.0
flicker          = 0.5     # stepped CRT flicker
curvature        = 0.45    # barrel warp (needs td-crt-pass renderer patch)
screen_glare    = 0.42    # top-left glass reflection, hacker-only by default
jiggle           = 0.7     # rare 1-2px vertical-hold hop

[font]
family = "JetBrains Mono"
size   = 14.0
