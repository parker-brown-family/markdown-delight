<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" fill="none">
  <!-- big modern COPY glyph = two sheets of paper (copy-with-comments) -->
  <ellipse cx="110" cy="112" rx="86" ry="74" fill="#36ff86" opacity="0.12"/>
  <!-- back sheet -->
  <g transform="rotate(-7 96 104)">
    <rect x="44" y="40" width="98" height="128" rx="12" fill="#0e2418" stroke="#36ff86" stroke-width="5"/>
    <path d="M60 64 h66 M60 80 h66 M60 96 h44" stroke="#2f7a4c" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- front sheet (the copy) -->
  <g transform="rotate(6 124 120)">
    <rect x="78" y="56" width="100" height="130" rx="12" fill="#f4fff7" stroke="#1c2a20" stroke-width="5"/>
    <!-- text lines -->
    <path d="M94 82 h66 M94 98 h66 M94 114 h40" stroke="#1c2a20" stroke-width="5" stroke-linecap="round"/>
    <!-- a 💬 comment blockquote band, injected -->
    <rect x="90" y="126" width="78" height="34" rx="6" fill="#36ff86" opacity="0.18"/>
    <text x="98" y="142" font-family="ui-monospace,monospace" font-size="12" font-weight="800" fill="#0c9b4c">&gt; 💬</text>
    <path d="M120 136 h40 M98 152 h62" stroke="#0c9b4c" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- little "+1 copy" spark -->
  <g transform="translate(168 56)">
    <circle r="18" fill="#36ff86" stroke="#0c1a13" stroke-width="4"/>
    <path d="M-8 0 h16 M0 -8 v16" stroke="#04130b" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
