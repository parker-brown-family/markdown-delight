<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" fill="none">
  <!-- silly hand-drawn stick human (crayon) -->
  <g stroke="#1c2a20" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-3 110 110)">
    <!-- wobbly head -->
    <path d="M110 30 C 92 30 80 44 80 60 C 80 78 94 90 110 90 C 128 90 140 76 140 60 C 140 42 126 30 110 30 Z" fill="#ffe2b0"/>
    <!-- goofy eyes + grin -->
    <circle cx="99" cy="58" r="3.5" fill="#1c2a20" stroke="none"/>
    <circle cx="122" cy="58" r="3.5" fill="#1c2a20" stroke="none"/>
    <path d="M96 70 Q 110 84 126 69" stroke-width="5"/>
    <!-- hair sprig -->
    <path d="M110 30 q 4 -12 12 -8" stroke-width="5"/>
    <!-- body -->
    <path d="M110 90 L 110 150"/>
    <!-- arms: one raised holding a page -->
    <path d="M110 108 L 78 128"/>
    <path d="M110 104 L 150 78"/>
    <!-- legs -->
    <path d="M110 150 L 86 196"/>
    <path d="M110 150 L 136 196"/>
  </g>
  <!-- the .md page the human holds up -->
  <g transform="rotate(12 156 70)">
    <rect x="138" y="50" width="40" height="50" rx="3" fill="#f4fff7" stroke="#1c2a20" stroke-width="4"/>
    <path d="M146 62 h24 M146 72 h24 M146 82 h16" stroke="#36c46a" stroke-width="3.5" stroke-linecap="round"/>
    <text x="158" y="46" font-family="ui-monospace,monospace" font-size="13" font-weight="800" fill="#1c2a20" text-anchor="middle">.md</text>
  </g>
</svg>
